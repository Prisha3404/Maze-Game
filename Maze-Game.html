<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Maze Game - AI Assignment</title>
  <style>
    /* Reset */
    html, body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      position: fixed;
      top: 0;
      left: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    /* Maze Container */
    #mazeContainer {
      display: inline-block;
      margin: auto;
      background-color: rgba(255, 255, 255, 0.6);
      opacity: 0;
      transition: opacity 1s linear;
      padding: 10px;
      max-width: 95vw;
      max-height: 60vh;
    }

    #mazeCanvas {
      margin: 0;
      display: block;
      border: solid 2px black;
      background-color: white;
      max-width: 95vw;
      height: auto;
      width: 100%;
      aspect-ratio: 1 / 1;
      touch-action: none;
    }

    /* Timer Display */
    .timer-section {
      background-color: rgba(255, 255, 255, 0.8);
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
      min-width: 120px;
      text-align: center;
      display: none;
    }

    .timer-section.active {
      display: block;
    }

    /* Inputs & Selects & Buttons */
    input, select, button {
      cursor: pointer;
      background-color: rgba(255, 182, 193, 0.8);
      height: 45px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      color: #333;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      transition: background-color 0.2s ease-in-out;
      box-sizing: border-box;
      margin: 5px;
      -webkit-appearance: none;
      appearance: none;
    }

    input, select {
      width: 150px;
    }

    button {
      width: 140px;
      background-color: rgba(100, 200, 150, 0.8);
    }

    button#solveBtn {
      background-color: rgba(255, 200, 100, 0.8);
    }

    button#quitBtn {
      background-color: rgba(255, 100, 100, 0.8);
    }

    input:hover, select:hover {
      background-color: rgba(173, 216, 230, 0.8);
    }

    button:hover {
      background-color: rgba(100, 220, 170, 0.9);
    }

    button#solveBtn:hover {
      background-color: rgba(255, 220, 120, 0.9);
    }

    button#quitBtn:hover {
      background-color: rgba(255, 120, 120, 0.9);
    }

    input:active, select:active, button:active {
      background-color: rgba(255, 255, 153, 0.8);
    }

    input:focus, select:focus, button:focus {
      outline: none;
      background-color: rgba(173, 216, 230, 0.9);
    }

    /* Disabled state */
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background-color: rgba(200, 200, 200, 0.8);
    }

    button:disabled:hover {
      background-color: rgba(200, 200, 200, 0.8);
    }

    /* Message Container */
    #Message-Container {
      visibility: hidden;
      color: #333;
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    #message {
      width: 85vw;
      max-width: 300px;
      height: auto;
      min-height: 250px;
      position: fixed;
      top: 50%;
      left: 50%;
      margin-left: -42.5vw;
      margin-left: calc(-42.5vw);
      max-margin-left: -150px;
      margin-top: -125px;
      background-color: rgba(255, 228, 225, 0.95);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    #message h1 {
      margin: 0;
      margin-bottom: 15px;
      font-weight: 600;
      font-size: 2rem;
      color: #333;
    }

    #message p {
      margin: 10px 0;
      color: #555;
      font-size: 14px;
    }

    #okBtn {
      margin-top: 15px;
    }

    /* Solution Info */
    .solution-info {
      background-color: rgba(100, 200, 150, 0.9);
      padding: 15px 20px;
      border-radius: 5px;
      font-size: 16px;
      color: white;
      display: none;
      min-width: 300px;
      font-weight: bold;
      word-wrap: break-word;
    }

    .solution-info.active {
      display: block;
    }

    /* Page & Menu */
    #page {
      text-align: center;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #menu {
      margin: 0;
      padding: 10px 5px;
      height: auto;
      box-sizing: border-box;
      background-color: rgba(255, 255, 255, 0.3);
      display: flex;
      justify-content: center;
      gap: 5px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #menu h2 {
      margin: 0;
      color: #333;
      font-size: 1.5rem;
    }

    #menu label {
      color: #333;
      font-weight: bold;
    }

    h1 {
      margin: 0;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 2.5rem;
      color: #444;
    }

    /* View */
    #view {
      flex: 1;
      overflow: auto;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5px;
      box-sizing: border-box;
      flex-direction: column;
      gap: 5px;
    }

    /* Gradient Background */
    #gradient {
      z-index: -1;
      position: fixed;
      top: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(-45deg, #ffd1dc, #fdfd96, #aec6cf, #b0e0e6);
      background-size: 400% 400%;
      animation: Gradient 15s ease infinite;
    }

    @keyframes Gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Confetti Styles */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 999;
    }

    /* Mobile Responsive */
    @media only screen and (max-width: 768px) {
      html, body {
        font-size: 14px;
      }

      input, select, button {
        width: 100px;
        height: 40px;
        font-size: 12px;
        padding: 8px;
        margin: 3px;
      }

      #mazeContainer {
        padding: 5px;
        max-height: 70vh;
      }

      #mazeCanvas {
        max-width: 95vw;
      }

      h1 {
        font-size: 2rem;
      }

      #menu {
        padding: 8px;
        gap: 3px;
      }

      .solution-info {
        font-size: 13px;
        padding: 10px 15px;
        min-width: 280px;
      }

      #message {
        width: 90vw;
        padding: 20px;
        min-height: 200px;
      }

      #message h1 {
        font-size: 1.5rem;
      }

      #message p {
        font-size: 13px;
      }
    }

    @media only screen and (max-width: 480px) {
      input, select, button {
        width: 90px;
        height: 38px;
        font-size: 11px;
        padding: 6px;
        margin: 2px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 5px;
      }

      #menu {
        padding: 5px;
        gap: 2px;
        flex-direction: column;
      }

      #view {
        padding: 3px;
        gap: 3px;
      }

      .timer-section {
        font-size: 14px;
        padding: 8px 15px;
      }

      .solution-info {
        font-size: 12px;
        padding: 8px 12px;
        min-width: 250px;
      }
    }
  </style>
</head>
<body>
  <div id="gradient"></div>
  
  <!-- Hidden audio element for background music - IMPORTANT: User interaction required for mobile audio -->
  <audio id="backgroundMusic" loop playsinline webkit-playsinline>
    <source src="background-music.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <div id="page">
    <!-- Victory Message -->
    <div id="Message-Container">
      <div id="message">
        <h1>Congratulations! 🎉</h1>
        <p>You completed the maze!</p>
        <p id="moves"></p>
        <p id="timeDisplay"></p>
        <input id="okBtn" type="button" onclick="resetGame()" value="Play Again" />
      </div>
    </div>

    <!-- Menu Section -->
    <div id="menu">
      <div style="display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center;">
        <label for="diffSelect">Difficulty:</label>
        <select id="diffSelect">
          <option value="10">Easy (10x10)</option>
          <option value="15">Medium (15x15)</option>
          <option value="25">Hard (25x25)</option>
          <option value="38">Extreme (38x38)</option>
        </select>
        <input id="startMazeBtn" type="button" onclick="makeMaze()" value="Start Game" />
      </div>
      <div style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;">
        <button id="solveBtn" onclick="solveMaze()" disabled>Solve Maze</button>
        <button id="quitBtn" onclick="quitGame()" disabled>Quit Game</button>
      </div>
      <div class="solution-info" id="solutionInfo"></div>
    </div>

    <!-- Maze View with Timer -->
    <div id="view">
      <div class="timer-section" id="timerSection">
        ⏱️ <span id="timerText">0s</span>
      </div>
      <div id="mazeContainer">
        <canvas id="mazeCanvas" class="border"></canvas>
      </div>
    </div>
  </div>

  <script>
    // ========== DRAG/SWIPE VARIABLES ==========
    let dragStartX = 0;
    let dragStartY = 0;
    let isDragging = false;
    let lastMoveTime = 0;
    const moveCooldown = 150; // Minimum ms between moves for smooth feel

    // ========== MAIN GAME VARIABLES ==========
    let maze;
    let drawMaze;
    let player;
    let currentCellSize;
    let gameStartTime = 0;
    let timerInterval = null;
    let gameActive = false;

    // ========== UTILITY FUNCTIONS ==========
    function rand(max) {
      return Math.floor(Math.random() * max);
    }

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins > 0) {
        return `${mins}m ${secs}s`;
      }
      return `${secs}s`;
    }

    function updateTimer() {
      if (!gameActive) return;
      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      document.getElementById("timerText").textContent = formatTime(elapsed);
    }

    function createConfetti() {
      const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'];
      const confettiCount = 100;

      for (let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight - window.innerHeight;
        
        confetti.style.left = x + 'px';
        confetti.style.top = y + 'px';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        
        document.body.appendChild(confetti);

        const duration = 3 + Math.random() * 2;
        const startTime = Date.now();
        
        const animate = () => {
          const elapsed = (Date.now() - startTime) / 1000;
          const progress = elapsed / duration;

          if (progress < 1) {
            confetti.style.top = (y + progress * window.innerHeight) + 'px';
            confetti.style.opacity = 1 - progress;
            confetti.style.transform = `rotate(${Math.random() * 360}deg) translateX(${(Math.random() - 0.5) * 200}px)`;
            requestAnimationFrame(animate);
          } else {
            confetti.remove();
          }
        };

        animate();
      }
    }

    function displayVictoryMess(moves) {
      if (timerInterval) clearInterval(timerInterval);
      gameActive = false;
      
      const audio = document.getElementById("backgroundMusic");
      audio.pause();
      audio.currentTime = 0;

      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);

      document.getElementById("moves").innerHTML = "You moved " + moves + " steps.";
      document.getElementById("timeDisplay").innerHTML = "Time: " + formatTime(elapsed);
      
      createConfetti();
      toggleVisibility("Message-Container");

      document.getElementById("solveBtn").disabled = true;
      document.getElementById("quitBtn").disabled = true;
    }

    function toggleVisibility(id) {
      const el = document.getElementById(id);
      el.style.visibility = (el.style.visibility === "visible") ? "hidden" : "visible";
    }

    function resetGame() {
      toggleVisibility("Message-Container");
      location.reload();
    }

    // ========== MAZE CLASS ==========
    function Maze(width, height) {
      let mazeMap;
      let startCoord, endCoord;
      const dirs = ["n", "s", "e", "w"];
      const modDir = {
        n: { y: -1, x: 0, o: "s" },
        s: { y: 1, x: 0, o: "n" },
        e: { y: 0, x: 1, o: "w" },
        w: { y: 0, x: -1, o: "e" }
      };

      this.map = () => mazeMap;
      this.startCoord = () => startCoord;
      this.endCoord = () => endCoord;

      function genMap() {
        mazeMap = new Array(height);
        for (let y = 0; y < height; y++) {
          mazeMap[y] = new Array(width);
          for (let x = 0; x < width; x++) {
            mazeMap[y][x] = { n: false, s: false, e: false, w: false, visited: false, priorPos: null };
          }
        }
      }

      function defineMaze() {
        let pos = { x: 0, y: 0 };
        let cellsVisited = 1;
        const numCells = width * height;

        while (cellsVisited < numCells) {
          mazeMap[pos.y][pos.x].visited = true;
          shuffle(dirs);

          let moved = false;
          for (let dir of dirs) {
            const nx = pos.x + modDir[dir].x;
            const ny = pos.y + modDir[dir].y;
            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
              if (!mazeMap[ny][nx].visited) {
                mazeMap[pos.y][pos.x][dir] = true;
                mazeMap[ny][nx][modDir[dir].o] = true;
                mazeMap[ny][nx].priorPos = pos;
                pos = { x: nx, y: ny };
                cellsVisited++;
                moved = true;
                break;
              }
            }
          }
          if (!moved) pos = mazeMap[pos.y][pos.x].priorPos;
        }
      }

      function defineStartEnd() {
        switch (rand(4)) {
          case 0: startCoord = { x: 0, y: 0 }; endCoord = { x: width - 1, y: height - 1 }; break;
          case 1: startCoord = { x: 0, y: height - 1 }; endCoord = { x: width - 1, y: 0 }; break;
          case 2: startCoord = { x: width - 1, y: 0 }; endCoord = { x: 0, y: height - 1 }; break;
          case 3: startCoord = { x: width - 1, y: height - 1 }; endCoord = { x: 0, y: 0 }; break;
        }
      }

      genMap();
      defineMaze();
      defineStartEnd();
    }

    // ========== DRAWING CLASS ==========
    function DrawMaze(mazeObj, ctx, cellSize, endSprite = null) {
      const map = mazeObj.map();
      let drawEndMethod;

      function drawCell(x, y, cell) {
        const px = x * cellSize;
        const py = y * cellSize;
        ctx.strokeStyle = "black";
        ctx.lineWidth = cellSize / 40;

        if (!cell.n) { 
          ctx.beginPath(); 
          ctx.moveTo(px, py); 
          ctx.lineTo(px + cellSize, py); 
          ctx.stroke(); 
        }
        if (!cell.s) { 
          ctx.beginPath(); 
          ctx.moveTo(px, py + cellSize); 
          ctx.lineTo(px + cellSize, py + cellSize); 
          ctx.stroke(); 
        }
        if (!cell.e) { 
          ctx.beginPath(); 
          ctx.moveTo(px + cellSize, py); 
          ctx.lineTo(px + cellSize, py + cellSize); 
          ctx.stroke(); 
        }
        if (!cell.w) { 
          ctx.beginPath(); 
          ctx.moveTo(px, py); 
          ctx.lineTo(px, py + cellSize); 
          ctx.stroke(); 
        }
      }

      function drawMap() {
        for (let y = 0; y < map.length; y++) {
          for (let x = 0; x < map[y].length; x++) {
            drawCell(x, y, map[y][x]);
          }
        }
      }

      function drawEndFlag() {
        const coord = mazeObj.endCoord();
        ctx.fillStyle = "red";
        ctx.fillRect(
          coord.x * cellSize + cellSize / 4, 
          coord.y * cellSize + cellSize / 4, 
          cellSize / 2, 
          cellSize / 2
        );
      }

      function clear() {
        ctx.clearRect(0, 0, cellSize * map[0].length, cellSize * map.length);
      }

      drawEndMethod = drawEndFlag;

      clear();
      drawMap();
      drawEndMethod();

      this.redrawMaze = function(size) {
        cellSize = size;
        clear();
        drawMap();
        drawEndMethod();
      };

      this.drawSolution = function(visitedCells, path) {
        clear();
        drawMap();

        for (let cell of visitedCells) {
          ctx.fillStyle = "rgba(173, 216, 230, 0.5)";
          ctx.fillRect(
            cell.x * cellSize + 2,
            cell.y * cellSize + 2,
            cellSize - 4,
            cellSize - 4
          );
        }

        if (path.length > 1) {
          ctx.strokeStyle = "#00AA00";
          ctx.lineWidth = cellSize / 4;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          
          ctx.beginPath();
          ctx.moveTo(
            (path[0].x + 0.5) * cellSize,
            (path[0].y + 0.5) * cellSize
          );
          
          for (let i = 1; i < path.length; i++) {
            ctx.lineTo(
              (path[i].x + 0.5) * cellSize,
              (path[i].y + 0.5) * cellSize
            );
          }
          ctx.stroke();
        }

        drawEndMethod();
      };
    }

    // ========== DFS SOLVER ==========
    function DFSSolver(mazeObj) {
      const map = mazeObj.map();
      const width = map[0].length;
      const height = map.length;
      const start = mazeObj.startCoord();
      const end = mazeObj.endCoord();

      const visited = new Set();
      const path = [];
      const visitedOrder = [];

      function dfs(current) {
        const key = `${current.x},${current.y}`;
        
        if (visited.has(key)) {
          return false;
        }

        visited.add(key);
        visitedOrder.push({ x: current.x, y: current.y });
        path.push({ x: current.x, y: current.y });

        if (current.x === end.x && current.y === end.y) {
          return true;
        }

        const cell = map[current.y][current.x];
        
        if (cell.n) {
          if (dfs({ x: current.x, y: current.y - 1 })) {
            return true;
          }
        }
        
        if (cell.s) {
          if (dfs({ x: current.x, y: current.y + 1 })) {
            return true;
          }
        }
        
        if (cell.e) {
          if (dfs({ x: current.x + 1, y: current.y })) {
            return true;
          }
        }
        
        if (cell.w) {
          if (dfs({ x: current.x - 1, y: current.y })) {
            return true;
          }
        }

        path.pop();
        return false;
      }

      dfs(start);
      return { path, visitedOrder };
    }

    // ========== PLAYER CLASS WITH SMOOTH TOUCH DRAG ==========
    function Player(mazeObj, canvas, cellSize, onComplete, sprite = null) {
      const ctx = canvas.getContext("2d");
      let moves = 0;
      let cellCoords = { x: mazeObj.startCoord().x, y: mazeObj.startCoord().y };
      const player = this;

      function drawSprite(coord) {
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(
          (coord.x + 0.5) * cellSize, 
          (coord.y + 0.5) * cellSize, 
          cellSize / 3, 
          0, 
          2 * Math.PI
        );
        ctx.fill();

        if (coord.x === mazeObj.endCoord().x && coord.y === mazeObj.endCoord().y) {
          onComplete(moves);
          player.unbindKeyDown();
          player.unbindTouchDrag();
        }
      }

      function removeSprite(coord) {
        const centerX = (coord.x + 0.5) * cellSize;
        const centerY = (coord.y + 0.5) * cellSize;
        const radius = cellSize / 3;
        
        const clearSize = radius * 2.2;
        ctx.clearRect(
          centerX - clearSize / 2, 
          centerY - clearSize / 2, 
          clearSize, 
          clearSize
        );
      }

      function movePlayer(direction) {
        // Apply cooldown to prevent multiple rapid moves
        const now = Date.now();
        if (now - lastMoveTime < moveCooldown) {
          return;
        }
        lastMoveTime = now;

        if (!gameActive) return;

        const cell = mazeObj.map()[cellCoords.y][cellCoords.x];
        let moved = false;

        switch(direction) {
          case 'up':
            if (cell.n) {
              removeSprite(cellCoords);
              cellCoords.y--;
              moved = true;
            }
            break;
          case 'down':
            if (cell.s) {
              removeSprite(cellCoords);
              cellCoords.y++;
              moved = true;
            }
            break;
          case 'left':
            if (cell.w) {
              removeSprite(cellCoords);
              cellCoords.x--;
              moved = true;
            }
            break;
          case 'right':
            if (cell.e) {
              removeSprite(cellCoords);
              cellCoords.x++;
              moved = true;
            }
            break;
        }

        if (moved) {
          moves++;
          drawSprite(cellCoords);
        }
      }

      // Keyboard handler
      function check(e) {
        switch (e.keyCode) {
          case 37: movePlayer('left'); break;   // left arrow
          case 38: movePlayer('up'); break;     // up arrow
          case 39: movePlayer('right'); break;  // right arrow
          case 40: movePlayer('down'); break;   // down arrow
        }
      }

      // FIXED: Smooth drag/swipe with correct directions
      function handleTouchStart(e) {
        isDragging = true;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
      }

      function handleTouchMove(e) {
        if (!isDragging || !gameActive) return;
        e.preventDefault(); // Prevent scrolling
        
        const currentX = e.touches[0].clientX;
        const currentY = e.touches[0].clientY;
        
        const diffX = currentX - dragStartX;
        const diffY = currentY - dragStartY;

        // Determine direction based on largest movement
        const threshold = 30;
        
        if (Math.abs(diffX) > Math.abs(diffY)) {
          // Horizontal movement - FIXED DIRECTION
          if (diffX > threshold) {
            // Moved right
            movePlayer('right');
            dragStartX = currentX; // Reset for next movement
          } else if (diffX < -threshold) {
            // Moved left
            movePlayer('left');
            dragStartX = currentX; // Reset for next movement
          }
        } else if (Math.abs(diffY) > threshold) {
          // Vertical movement - FIXED DIRECTION
          if (diffY > threshold) {
            // Moved down
            movePlayer('down');
            dragStartY = currentY; // Reset for next movement
          } else if (diffY < -threshold) {
            // Moved up
            movePlayer('up');
            dragStartY = currentY; // Reset for next movement
          }
        }
      }

      function handleTouchEnd(e) {
        isDragging = false;
      }

      this.bindKeyDown = function() {
        window.addEventListener("keydown", check, false);
      };

      this.bindTouchDrag = function() {
        document.addEventListener("touchstart", handleTouchStart, false);
        document.addEventListener("touchmove", handleTouchMove, false);
        document.addEventListener("touchend", handleTouchEnd, false);
      };

      this.unbindKeyDown = function() {
        window.removeEventListener("keydown", check, false);
      };

      this.unbindTouchDrag = function() {
        document.removeEventListener("touchstart", handleTouchStart, false);
        document.removeEventListener("touchmove", handleTouchMove, false);
        document.removeEventListener("touchend", handleTouchEnd, false);
      };

      drawSprite(cellCoords);
    }

    // ========== SOLVE MAZE FUNCTION ==========
    function solveMaze() {
      if (!maze || !drawMaze) {
        alert("Please start a game first!");
        return;
      }

      gameActive = false;
      if (timerInterval) clearInterval(timerInterval);

      if (player) {
        player.unbindKeyDown();
        player.unbindTouchDrag();
      }

      const result = DFSSolver(maze);

      if (result.path && result.path.length > 0) {
        drawMaze.drawSolution(result.visitedOrder, result.path);

        document.getElementById("solutionInfo").textContent = 
          `✓ Solution Found! Path length: ${result.path.length} steps | Cells explored: ${result.visitedOrder.length}`;
        document.getElementById("solutionInfo").classList.add("active");
      } else {
        alert("No solution found! (This shouldn't happen)");
      }

      document.getElementById("solveBtn").disabled = true;
    }

    // ========== QUIT GAME FUNCTION ==========
    function quitGame() {
      gameActive = false;
      if (timerInterval) clearInterval(timerInterval);

      if (player) {
        player.unbindKeyDown();
        player.unbindTouchDrag();
      }

      const audio = document.getElementById("backgroundMusic");
      audio.pause();
      audio.currentTime = 0;

      document.getElementById("solutionInfo").classList.remove("active");

      document.getElementById("solveBtn").disabled = true;
      document.getElementById("quitBtn").disabled = true;

      const timeElapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      alert(`Game Quit! Time played: ${formatTime(timeElapsed)}`);

      setTimeout(() => {
        location.reload();
      }, 500);
    }

    // ========== MAIN GAME FUNCTION WITH MOBILE AUDIO FIX ==========
    function makeMaze() {
      const diffSelect = document.getElementById("diffSelect");
      const cellNum = parseInt(diffSelect.value);
      
      const canvas = document.getElementById("mazeCanvas");
      const mazeContainer = document.getElementById("mazeContainer");
      
      // Make canvas responsive
      const containerWidth = mazeContainer.offsetWidth;
      const canvasSize = Math.min(800, containerWidth - 20);
      const cellSize = canvasSize / cellNum;
      currentCellSize = cellSize;

      canvas.width = canvasSize;
      canvas.height = canvasSize;

      const ctx = canvas.getContext("2d");

      maze = new Maze(cellNum, cellNum);
      drawMaze = new DrawMaze(maze, ctx, cellSize);
      player = new Player(maze, canvas, cellSize, displayVictoryMess);

      player.bindKeyDown();
      player.bindTouchDrag();

      mazeContainer.style.opacity = "1";
      document.getElementById("timerSection").classList.add("active");
      document.getElementById("solutionInfo").classList.remove("active");

      document.getElementById("solveBtn").disabled = false;
      document.getElementById("quitBtn").disabled = false;

      gameActive = true;
      gameStartTime = Date.now();
      lastMoveTime = 0; // Reset move timing

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 100);

      // FIXED AUDIO: Use different approach for mobile
      const audio = document.getElementById("backgroundMusic");
      audio.currentTime = 0;
      
      // Try to play with error handling
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise
          .then(() => {
            console.log("Audio playing successfully");
          })
          .catch((error) => {
            console.log("Audio autoplay failed (mobile may require user interaction):", error);
            // On mobile, audio will start on user's first interaction
            // Add one-time listener for user interaction
            function enableAudioOnInteraction() {
              audio.play().catch(() => {});
              document.removeEventListener("touchstart", enableAudioOnInteraction);
              document.removeEventListener("click", enableAudioOnInteraction);
            }
            document.addEventListener("touchstart", enableAudioOnInteraction);
            document.addEventListener("click", enableAudioOnInteraction);
          });
      }
      
      console.log("Maze game started!");
    }

    // ========== WINDOW RESIZE HANDLER ==========
    window.addEventListener("resize", function() {
      if (drawMaze && currentCellSize) {
        const canvas = document.getElementById("mazeCanvas");
        const ctx = canvas.getContext("2d");
        drawMaze.redrawMaze(currentCellSize);
      }
    });

    // ========== PAGE LOAD ==========
    document.addEventListener("DOMContentLoaded", function() {
      console.log("Maze Game Mobile & Desktop Edition loaded!");
    });
  </script>
</body>
</html>
