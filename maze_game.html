<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Maze Game - AI Assignment</title>
  <style>
    html, body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      position: fixed;
      top: 0;
      left: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    #mazeContainer {
      display: inline-block;
      margin: auto;
      background-color: rgba(255, 255, 255, 0.6);
      opacity: 0;
      transition: opacity 1s linear;
      padding: 10px;
      max-width: 95vw;
      max-height: 60vh;
    }

    #mazeCanvas {
      margin: 0;
      display: block;
      border: solid 2px black;
      background-color: white;
      max-width: 95vw;
      height: auto;
      width: 100%;
      aspect-ratio: 1 / 1;
      touch-action: none;
    }

    .timer-section {
      background-color: rgba(255, 255, 255, 0.8);
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
      min-width: 120px;
      text-align: center;
      display: none;
    }

    .timer-section.active {
      display: block;
    }

    input, select, button {
      cursor: pointer;
      background-color: rgba(255, 182, 193, 0.8);
      height: 45px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      color: #333;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      transition: background-color 0.2s ease-in-out;
      box-sizing: border-box;
      margin: 5px;
      -webkit-appearance: none;
      appearance: none;
    }

    input, select {
      width: 150px;
    }

    button {
      width: 140px;
      background-color: rgba(100, 200, 150, 0.8);
    }

    button#solveBtn {
      background-color: rgba(255, 200, 100, 0.8);
    }

    button#quitBtn {
      background-color: rgba(255, 100, 100, 0.8);
    }

    input:hover, select:hover {
      background-color: rgba(173, 216, 230, 0.8);
    }

    button:hover {
      background-color: rgba(100, 220, 170, 0.9);
    }

    button#solveBtn:hover {
      background-color: rgba(255, 220, 120, 0.9);
    }

    button#quitBtn:hover {
      background-color: rgba(255, 120, 120, 0.9);
    }

    input:active, select:active, button:active {
      background-color: rgba(255, 255, 153, 0.8);
    }

    input:focus, select:focus, button:focus {
      outline: none;
      background-color: rgba(173, 216, 230, 0.9);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background-color: rgba(200, 200, 200, 0.8);
    }

    button:disabled:hover {
      background-color: rgba(200, 200, 200, 0.8);
    }

    #Message-Container {
      visibility: hidden;
      color: #333;
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    #message {
      width: 85vw;
      max-width: 300px;
      height: auto;
      min-height: 250px;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(255, 228, 225, 0.95);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    #message h1 {
      margin: 0;
      margin-bottom: 15px;
      font-weight: 600;
      font-size: 2rem;
      color: #333;
    }

    #message p {
      margin: 10px 0;
      color: #555;
      font-size: 14px;
    }

    #okBtn {
      margin-top: 15px;
    }

    .solution-info {
      background-color: rgba(100, 200, 150, 0.9);
      padding: 15px 20px;
      border-radius: 5px;
      font-size: 16px;
      color: white;
      display: none;
      min-width: 300px;
      font-weight: bold;
      word-wrap: break-word;
    }

    .solution-info.active {
      display: block;
    }

    #page {
      text-align: center;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #menu {
      margin: 0;
      padding: 10px 5px;
      height: auto;
      box-sizing: border-box;
      background-color: rgba(255, 255, 255, 0.3);
      display: flex;
      justify-content: center;
      gap: 5px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #menu h2 {
      margin: 0;
      color: #333;
      font-size: 1.5rem;
    }

    #menu label {
      color: #333;
      font-weight: bold;
    }

    h1 {
      margin: 0;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 2.5rem;
      color: #444;
    }

    #view {
      flex: 1;
      overflow: auto;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5px;
      box-sizing: border-box;
      flex-direction: column;
      gap: 5px;
    }

    #gradient {
      z-index: -1;
      position: fixed;
      top: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(-45deg, #ffd1dc, #fdfd96, #aec6cf, #b0e0e6);
      background-size: 400% 400%;
      animation: Gradient 15s ease infinite;
    }

    @keyframes Gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 999;
    }

    @media only screen and (max-width: 768px) {
      html, body { font-size: 14px; }

      input, select, button {
        width: 100px;
        height: 40px;
        font-size: 12px;
        padding: 8px;
        margin: 3px;
      }

      #mazeContainer {
        padding: 5px;
        max-height: 70vh;
      }

      #mazeCanvas { max-width: 95vw; }

      h1 { font-size: 2rem; }

      #menu {
        padding: 8px;
        gap: 3px;
      }

      .solution-info {
        font-size: 13px;
        padding: 10px 15px;
        min-width: 280px;
      }

      #message {
        width: 90vw;
        padding: 20px;
        min-height: 200px;
      }

      #message h1 { font-size: 1.5rem; }
      #message p { font-size: 13px; }
    }

    @media only screen and (max-width: 480px) {
      input, select, button {
        width: 90px;
        height: 38px;
        font-size: 11px;
        padding: 6px;
        margin: 2px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 5px;
      }

      #menu {
        padding: 5px;
        gap: 2px;
        flex-direction: column;
      }

      #view {
        padding: 3px;
        gap: 3px;
      }

      .timer-section {
        font-size: 14px;
        padding: 8px 15px;
      }

      .solution-info {
        font-size: 12px;
        padding: 8px 12px;
        min-width: 250px;
      }
    }
  </style>
</head>
<body>
  <div id="gradient"></div>

  <audio id="backgroundMusic" loop playsinline webkit-playsinline>
    <source src="background-music.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <div id="page">
    <div id="Message-Container">
      <div id="message">
        <h1>Congratulations! 🎉</h1>
        <p>You completed the maze!</p>
        <p id="moves"></p>
        <p id="timeDisplay"></p>
        <input id="okBtn" type="button" onclick="resetGame()" value="Play Again" />
      </div>
    </div>

    <div id="menu">
      <div style="display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center;">
        <label for="diffSelect">Difficulty:</label>
        <select id="diffSelect">
          <option value="10">Easy (10x10)</option>
          <option value="15">Medium (15x15)</option>
          <option value="25">Hard (25x25)</option>
          <option value="38">Extreme (38x38)</option>
        </select>
        <input id="startMazeBtn" type="button" onclick="makeMaze()" value="Start Game" />
      </div>
      <div style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;">
        <button id="solveBtn" onclick="solveMaze()" disabled>Solve Maze</button>
        <button id="quitBtn" onclick="quitGame()" disabled>Quit Game</button>
      </div>
      <div class="solution-info" id="solutionInfo"></div>
    </div>

    <div id="view">
      <div class="timer-section" id="timerSection">
        ⏱️ <span id="timerText">0s</span>
      </div>
      <div id="mazeContainer">
        <canvas id="mazeCanvas" class="border"></canvas>
      </div>
    </div>
  </div>

  <script>
    // ========== DRAG/SWIPE VARIABLES ==========
    let dragStartX = 0;
    let dragStartY = 0;
    let isDragging = false;
    let lastMoveTime = 0;
    const moveCooldown = 150;

    // ========== MAIN GAME VARIABLES ==========
    let maze;
    let drawMaze;
    let player;
    let currentCellSize;
    let gameStartTime = 0;
    let timerInterval = null;
    let gameActive = false;

    // ========== UTILITY FUNCTIONS ==========
    function rand(max) {
      return Math.floor(Math.random() * max);
    }

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins > 0) return `${mins}m ${secs}s`;
      return `${secs}s`;
    }

    function updateTimer() {
      if (!gameActive) return;
      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      document.getElementById("timerText").textContent = formatTime(elapsed);
    }

    function createConfetti() {
      const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'];
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight - window.innerHeight;
        confetti.style.left = x + 'px';
        confetti.style.top = y + 'px';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(confetti);
        const duration = 3 + Math.random() * 2;
        const startTime = Date.now();
        const animate = () => {
          const elapsed = (Date.now() - startTime) / 1000;
          const progress = elapsed / duration;
          if (progress < 1) {
            confetti.style.top = (y + progress * window.innerHeight) + 'px';
            confetti.style.opacity = 1 - progress;
            confetti.style.transform = `rotate(${Math.random() * 360}deg) translateX(${(Math.random() - 0.5) * 200}px)`;
            requestAnimationFrame(animate);
          } else {
            confetti.remove();
          }
        };
        animate();
      }
    }

    function displayVictoryMess(moves) {
      if (timerInterval) clearInterval(timerInterval);
      gameActive = false;
      const audio = document.getElementById("backgroundMusic");
      audio.pause();
      audio.currentTime = 0;
      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      document.getElementById("moves").innerHTML = "You moved " + moves + " steps.";
      document.getElementById("timeDisplay").innerHTML = "Time: " + formatTime(elapsed);
      createConfetti();
      toggleVisibility("Message-Container");
      document.getElementById("solveBtn").disabled = true;
      document.getElementById("quitBtn").disabled = true;
    }

    function toggleVisibility(id) {
      const el = document.getElementById(id);
      el.style.visibility = (el.style.visibility === "visible") ? "hidden" : "visible";
    }

    function resetGame() {
      toggleVisibility("Message-Container");
      location.reload();
    }

    // ========== MAZE CLASS (with multi-path braiding) ==========
    function Maze(width, height) {
      let mazeMap;
      let startCoord, endCoord;
      const dirs = ["n", "s", "e", "w"];
      const modDir = {
        n: { y: -1, x: 0, o: "s" },
        s: { y:  1, x: 0, o: "n" },
        e: { y:  0, x: 1, o: "w" },
        w: { y:  0, x:-1, o: "e" }
      };

      this.map = () => mazeMap;
      this.startCoord = () => startCoord;
      this.endCoord = () => endCoord;

      function genMap() {
        mazeMap = new Array(height);
        for (let y = 0; y < height; y++) {
          mazeMap[y] = new Array(width);
          for (let x = 0; x < width; x++) {
            mazeMap[y][x] = { n: false, s: false, e: false, w: false, visited: false, priorPos: null };
          }
        }
      }

      // Perfect maze via recursive backtracker (DFS)
      function defineMaze() {
        let pos = { x: 0, y: 0 };
        let cellsVisited = 1;
        const numCells = width * height;
        while (cellsVisited < numCells) {
          mazeMap[pos.y][pos.x].visited = true;
          shuffle(dirs);
          let moved = false;
          for (let dir of dirs) {
            const nx = pos.x + modDir[dir].x;
            const ny = pos.y + modDir[dir].y;
            if (nx >= 0 && nx < width && ny >= 0 && ny < height && !mazeMap[ny][nx].visited) {
              mazeMap[pos.y][pos.x][dir] = true;
              mazeMap[ny][nx][modDir[dir].o] = true;
              mazeMap[ny][nx].priorPos = pos;
              pos = { x: nx, y: ny };
              cellsVisited++;
              moved = true;
              break;
            }
          }
          if (!moved) pos = mazeMap[pos.y][pos.x].priorPos;
        }
      }

      // ── MULTI-PATH BRAIDING ──────────────────────────────────────────────────
      // After generating a perfect maze (exactly one path between any two cells),
      // we "braid" it by randomly removing ~25% of remaining walls between
      // adjacent cells. This creates loops so the user can approach the goal
      // via multiple different routes, while A* still finds the shortest one.
      function braidMaze() {
        const braidFactor = 0.25; // fraction of dead-end walls to remove
        const candidates = [];

        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            // Collect every closed wall that has a valid neighbour
            if (!mazeMap[y][x].s && y + 1 < height) candidates.push({ x, y, dir: "s" });
            if (!mazeMap[y][x].e && x + 1 < width)  candidates.push({ x, y, dir: "e" });
          }
        }

        shuffle(candidates);
        const removeCount = Math.floor(candidates.length * braidFactor);

        for (let i = 0; i < removeCount; i++) {
          const { x, y, dir } = candidates[i];
          const nx = x + modDir[dir].x;
          const ny = y + modDir[dir].y;
          // Open the wall in both directions
          mazeMap[y][x][dir] = true;
          mazeMap[ny][nx][modDir[dir].o] = true;
        }
      }
      // ────────────────────────────────────────────────────────────────────────

      function defineStartEnd() {
        switch (rand(4)) {
          case 0: startCoord = { x: 0,         y: 0          }; endCoord = { x: width-1,   y: height-1  }; break;
          case 1: startCoord = { x: 0,         y: height-1   }; endCoord = { x: width-1,   y: 0         }; break;
          case 2: startCoord = { x: width-1,   y: 0          }; endCoord = { x: 0,         y: height-1  }; break;
          case 3: startCoord = { x: width-1,   y: height-1   }; endCoord = { x: 0,         y: 0         }; break;
        }
      }

      genMap();
      defineMaze();
      braidMaze();   // ← create multiple paths
      defineStartEnd();
    }

    // ========== DRAWING CLASS ==========
    function DrawMaze(mazeObj, ctx, cellSize) {
      const map = mazeObj.map();
      let drawEndMethod;

      function drawCell(x, y, cell) {
        const px = x * cellSize;
        const py = y * cellSize;
        ctx.strokeStyle = "black";
        ctx.lineWidth = cellSize / 40;

        if (!cell.n) { ctx.beginPath(); ctx.moveTo(px, py);             ctx.lineTo(px + cellSize, py);             ctx.stroke(); }
        if (!cell.s) { ctx.beginPath(); ctx.moveTo(px, py + cellSize);  ctx.lineTo(px + cellSize, py + cellSize);  ctx.stroke(); }
        if (!cell.e) { ctx.beginPath(); ctx.moveTo(px + cellSize, py);  ctx.lineTo(px + cellSize, py + cellSize);  ctx.stroke(); }
        if (!cell.w) { ctx.beginPath(); ctx.moveTo(px, py);             ctx.lineTo(px, py + cellSize);             ctx.stroke(); }
      }

      function drawMap() {
        for (let y = 0; y < map.length; y++)
          for (let x = 0; x < map[y].length; x++)
            drawCell(x, y, map[y][x]);
      }

      function drawEndFlag() {
        const coord = mazeObj.endCoord();
        ctx.fillStyle = "red";
        ctx.fillRect(
          coord.x * cellSize + cellSize / 4,
          coord.y * cellSize + cellSize / 4,
          cellSize / 2,
          cellSize / 2
        );
      }

      function clear() {
        ctx.clearRect(0, 0, cellSize * map[0].length, cellSize * map.length);
      }

      drawEndMethod = drawEndFlag;
      clear();
      drawMap();
      drawEndMethod();

      this.redrawMaze = function(size) {
        cellSize = size;
        clear();
        drawMap();
        drawEndMethod();
      };

      // ── Visualise A* result ──────────────────────────────────────────────────
      // visitedCells  – every node A* popped from the open set (light-blue tint)
      // path          – the optimal route (green line)
      this.drawSolution = function(visitedCells, path) {
        clear();
        drawMap();

        // Shade explored cells
        for (let cell of visitedCells) {
          ctx.fillStyle = "rgba(173, 216, 230, 0.5)";
          ctx.fillRect(cell.x * cellSize + 2, cell.y * cellSize + 2, cellSize - 4, cellSize - 4);
        }

        // Draw shortest path
        if (path.length > 1) {
          ctx.strokeStyle = "#00AA00";
          ctx.lineWidth = cellSize / 4;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.beginPath();
          ctx.moveTo((path[0].x + 0.5) * cellSize, (path[0].y + 0.5) * cellSize);
          for (let i = 1; i < path.length; i++)
            ctx.lineTo((path[i].x + 0.5) * cellSize, (path[i].y + 0.5) * cellSize);
          ctx.stroke();
        }

        drawEndMethod();
      };
      // ────────────────────────────────────────────────────────────────────────
    }

    // ========== A* SOLVER ==========
    // Replaces the old DFS solver.
    // Uses Manhattan-distance heuristic; guarantees the SHORTEST path.
    //
    // Returns { path, visitedOrder } where:
    //   path        – optimal sequence of {x,y} nodes from start → end
    //   visitedOrder – all nodes that A* expanded (for the blue exploration overlay)
    function AStarSolver(mazeObj) {
      const map   = mazeObj.map();
      const start = mazeObj.startCoord();
      const end   = mazeObj.endCoord();

      // Manhattan distance heuristic
      function heuristic(a, b) {
        return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
      }

      // Min-heap (priority queue) – simple binary-heap implementation
      class MinHeap {
        constructor() { this.heap = []; }
        push(item) {
          this.heap.push(item);
          this._bubbleUp(this.heap.length - 1);
        }
        pop() {
          const top = this.heap[0];
          const last = this.heap.pop();
          if (this.heap.length > 0) {
            this.heap[0] = last;
            this._sinkDown(0);
          }
          return top;
        }
        get size() { return this.heap.length; }
        _bubbleUp(i) {
          while (i > 0) {
            const parent = Math.floor((i - 1) / 2);
            if (this.heap[parent].f <= this.heap[i].f) break;
            [this.heap[parent], this.heap[i]] = [this.heap[i], this.heap[parent]];
            i = parent;
          }
        }
        _sinkDown(i) {
          const n = this.heap.length;
          while (true) {
            let smallest = i;
            const l = 2 * i + 1, r = 2 * i + 2;
            if (l < n && this.heap[l].f < this.heap[smallest].f) smallest = l;
            if (r < n && this.heap[r].f < this.heap[smallest].f) smallest = r;
            if (smallest === i) break;
            [this.heap[smallest], this.heap[i]] = [this.heap[i], this.heap[smallest]];
            i = smallest;
          }
        }
      }

      const key = (x, y) => `${x},${y}`;

      const gScore   = {};   // cost from start to node
      const cameFrom = {};   // for path reconstruction
      const visitedOrder = [];

      gScore[key(start.x, start.y)] = 0;

      const openSet = new MinHeap();
      openSet.push({ x: start.x, y: start.y, f: heuristic(start, end) });

      const closed = new Set();

      const directions = [
        { dir: "n", dx: 0,  dy: -1 },
        { dir: "s", dx: 0,  dy:  1 },
        { dir: "e", dx: 1,  dy:  0 },
        { dir: "w", dx: -1, dy:  0 },
      ];

      while (openSet.size > 0) {
        const current = openSet.pop();
        const ck = key(current.x, current.y);

        if (closed.has(ck)) continue;
        closed.add(ck);
        visitedOrder.push({ x: current.x, y: current.y });

        // Reached the goal – reconstruct path
        if (current.x === end.x && current.y === end.y) {
          const path = [];
          let node = ck;
          while (node) {
            const [nx, ny] = node.split(",").map(Number);
            path.unshift({ x: nx, y: ny });
            node = cameFrom[node];
          }
          return { path, visitedOrder };
        }

        const cell = map[current.y][current.x];
        const g = gScore[ck];

        for (const { dir, dx, dy } of directions) {
          if (!cell[dir]) continue;           // wall blocks this direction
          const nx = current.x + dx;
          const ny = current.y + dy;
          const nk = key(nx, ny);
          if (closed.has(nk)) continue;

          const tentativeG = g + 1;
          if (tentativeG < (gScore[nk] ?? Infinity)) {
            gScore[nk]   = tentativeG;
            cameFrom[nk] = ck;
            openSet.push({ x: nx, y: ny, f: tentativeG + heuristic({ x: nx, y: ny }, end) });
          }
        }
      }

      // No path found (should not happen in a connected maze)
      return { path: [], visitedOrder };
    }

    // ========== PLAYER CLASS ==========
    function Player(mazeObj, canvas, cellSize, onComplete) {
      const ctx = canvas.getContext("2d");
      let moves = 0;
      let cellCoords = { x: mazeObj.startCoord().x, y: mazeObj.startCoord().y };
      const player = this;

      function drawSprite(coord) {
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc((coord.x + 0.5) * cellSize, (coord.y + 0.5) * cellSize, cellSize / 3, 0, 2 * Math.PI);
        ctx.fill();
        if (coord.x === mazeObj.endCoord().x && coord.y === mazeObj.endCoord().y) {
          onComplete(moves);
          player.unbindKeyDown();
          player.unbindTouchDrag();
        }
      }

      function removeSprite(coord) {
        const cx = (coord.x + 0.5) * cellSize;
        const cy = (coord.y + 0.5) * cellSize;
        const r  = cellSize / 3;
        const s  = r * 2.2;
        ctx.clearRect(cx - s / 2, cy - s / 2, s, s);
      }

      function movePlayer(direction) {
        const now = Date.now();
        if (now - lastMoveTime < moveCooldown) return;
        lastMoveTime = now;
        if (!gameActive) return;

        const cell = mazeObj.map()[cellCoords.y][cellCoords.x];
        let moved = false;

        switch (direction) {
          case 'up':    if (cell.n) { removeSprite(cellCoords); cellCoords.y--; moved = true; } break;
          case 'down':  if (cell.s) { removeSprite(cellCoords); cellCoords.y++; moved = true; } break;
          case 'left':  if (cell.w) { removeSprite(cellCoords); cellCoords.x--; moved = true; } break;
          case 'right': if (cell.e) { removeSprite(cellCoords); cellCoords.x++; moved = true; } break;
        }

        if (moved) { moves++; drawSprite(cellCoords); }
      }

      function check(e) {
        switch (e.keyCode) {
          case 37: movePlayer('left');  break;
          case 38: movePlayer('up');    break;
          case 39: movePlayer('right'); break;
          case 40: movePlayer('down');  break;
        }
      }

      function handleTouchStart(e) {
        isDragging = true;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
      }

      function handleTouchMove(e) {
        if (!isDragging || !gameActive) return;
        e.preventDefault();
        const currentX = e.touches[0].clientX;
        const currentY = e.touches[0].clientY;
        const diffX = currentX - dragStartX;
        const diffY = currentY - dragStartY;
        const threshold = 30;

        if (Math.abs(diffX) > Math.abs(diffY)) {
          if      (diffX >  threshold) { movePlayer('right'); dragStartX = currentX; }
          else if (diffX < -threshold) { movePlayer('left');  dragStartX = currentX; }
        } else if (Math.abs(diffY) > threshold) {
          if      (diffY >  threshold) { movePlayer('down'); dragStartY = currentY; }
          else if (diffY < -threshold) { movePlayer('up');   dragStartY = currentY; }
        }
      }

      function handleTouchEnd() { isDragging = false; }

      this.bindKeyDown    = () => window.addEventListener("keydown", check, false);
      this.bindTouchDrag  = () => {
        document.addEventListener("touchstart", handleTouchStart, false);
        document.addEventListener("touchmove",  handleTouchMove,  false);
        document.addEventListener("touchend",   handleTouchEnd,   false);
      };
      this.unbindKeyDown  = () => window.removeEventListener("keydown", check, false);
      this.unbindTouchDrag = () => {
        document.removeEventListener("touchstart", handleTouchStart, false);
        document.removeEventListener("touchmove",  handleTouchMove,  false);
        document.removeEventListener("touchend",   handleTouchEnd,   false);
      };

      drawSprite(cellCoords);
    }

    // ========== SOLVE MAZE (A*) ==========
    function solveMaze() {
      if (!maze || !drawMaze) { alert("Please start a game first!"); return; }

      gameActive = false;
      if (timerInterval) clearInterval(timerInterval);

      if (player) {
        player.unbindKeyDown();
        player.unbindTouchDrag();
      }

      const result = AStarSolver(maze);

      if (result.path && result.path.length > 0) {
        drawMaze.drawSolution(result.visitedOrder, result.path);
        document.getElementById("solutionInfo").textContent =
          `⭐ A* Shortest Path: ${result.path.length - 1} steps | Cells explored: ${result.visitedOrder.length}`;
        document.getElementById("solutionInfo").classList.add("active");
      } else {
        alert("No solution found!");
      }

      document.getElementById("solveBtn").disabled = true;
    }

    // ========== QUIT GAME ==========
    function quitGame() {
      gameActive = false;
      if (timerInterval) clearInterval(timerInterval);

      if (player) { player.unbindKeyDown(); player.unbindTouchDrag(); }

      const audio = document.getElementById("backgroundMusic");
      audio.pause();
      audio.currentTime = 0;

      document.getElementById("solutionInfo").classList.remove("active");
      document.getElementById("solveBtn").disabled = true;
      document.getElementById("quitBtn").disabled = true;

      const timeElapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      alert(`Game Quit! Time played: ${formatTime(timeElapsed)}`);

      setTimeout(() => location.reload(), 500);
    }

    // ========== MAKE MAZE ==========
    function makeMaze() {
      const cellNum     = parseInt(document.getElementById("diffSelect").value);
      const canvas      = document.getElementById("mazeCanvas");
      const mazeContainer = document.getElementById("mazeContainer");
      const containerWidth = mazeContainer.offsetWidth;
      const canvasSize  = Math.min(800, containerWidth - 20);
      const cellSize    = canvasSize / cellNum;
      currentCellSize   = cellSize;

      canvas.width  = canvasSize;
      canvas.height = canvasSize;

      const ctx = canvas.getContext("2d");

      maze     = new Maze(cellNum, cellNum);
      drawMaze = new DrawMaze(maze, ctx, cellSize);
      player   = new Player(maze, canvas, cellSize, displayVictoryMess);

      player.bindKeyDown();
      player.bindTouchDrag();

      mazeContainer.style.opacity = "1";
      document.getElementById("timerSection").classList.add("active");
      document.getElementById("solutionInfo").classList.remove("active");
      document.getElementById("solveBtn").disabled = false;
      document.getElementById("quitBtn").disabled  = false;

      gameActive     = true;
      gameStartTime  = Date.now();
      lastMoveTime   = 0;

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 100);

      const audio = document.getElementById("backgroundMusic");
      audio.currentTime = 0;
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          function enableAudio() {
            audio.play().catch(() => {});
            document.removeEventListener("touchstart", enableAudio);
            document.removeEventListener("click",      enableAudio);
          }
          document.addEventListener("touchstart", enableAudio);
          document.addEventListener("click",      enableAudio);
        });
      }
    }

    // ========== RESIZE HANDLER ==========
    window.addEventListener("resize", function() {
      if (drawMaze && currentCellSize) drawMaze.redrawMaze(currentCellSize);
    });

    document.addEventListener("DOMContentLoaded", function() {
      console.log("Maze Game (A* + Multi-path) loaded!");
    });
  </script>
</body>
</html>
